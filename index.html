<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Weather Dashboard | Interactive 3D Bot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading 3D Scene...</p>
    </div>

    <!-- 3D Canvas -->
    <canvas id="canvas3d"></canvas>

    <!-- Overlay UI -->
    <header>
        <div class="logo">WEADU</div>
        <nav>
            <ul>
                <li><a href="#" class="active">HOME</a></li>
                <li><a href="#">FORECAST</a></li>
                <li><a href="#">SETTINGS</a></li>
            </ul>
        </nav>
    </header>

    <div class="sidebar">
    <button class="glass-btn" data-action="search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Search</span>
    </button>

    <button class="glass-btn" data-action="style">
      <i class="fa-solid fa-shirt"></i>
      <span>Style</span>
    </button>

    <button class="glass-btn" data-action="forecast">
      <i class="fa-solid fa-calendar-days"></i>
      <span>Forecast</span>
    </button>
  </div>

  <!-- Search UI Overlay -->
  <div id="search-overlay" class="search-overlay hidden">
    <div class="search-modal glass-panel">
        <h3>Find Your City</h3>
        <div class="search-box">
            <input type="text" id="city-search-input" placeholder="e.g. New York, Tokyo...">
            <button id="city-search-btn"><i class="fa-solid fa-location-arrow"></i></button>
        </div>
        <button class="close-search"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>

    <div class="weather-dashboard" id="weatherDashboard">
      <div class="wd-top">
        <h2 id="city">--</h2>
        <p id="date"></p>
      </div>

      <div class="wd-main">
        <i id="weatherIcon" class="fa-solid fa-cloud"></i>
        <h1 id="temp">--°C</h1>
        <p id="condition">--</p>
      </div>

      <div class="wd-extra">
        <div>
          <span>Feels</span>
          <p id="feels"></p>
        </div>
        <div>
          <span>Humidity</span>
          <p id="humidity"></p>
        </div>
        <div>
          <span>Wind</span>
          <p id="wind"></p>
        </div>
      </div>
    </div>

    <!-- AI Chat Bubble Overlay -->
    <div id="ai-chat-bubble" class="chat-bubble hidden">
        <div class="bubble-content">
            <p id="ai-response">Hello! I'm your weather assistant. Ask me anything!</p>
        </div>
        <div class="bubble-tail"></div>
    </div>

    <!-- Chat Input Area -->
    <div class="chat-input-container">
        <input type="text" id="chat-input" placeholder="Ask the bot about weather...">
        <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <!-- Smart Suggestions Panel -->
    <div id="smart-panel" class="smart-panel hidden">
        <div class="smart-item" id="suggestion-wear">
            <i class="fa-solid fa-shirt"></i>
            <div>
                <span>What to Wear</span>
                <p>--</p>
            </div>
        </div>
        <div class="smart-item" id="suggestion-carry">
            <i class="fa-solid fa-briefcase"></i>
            <div>
                <span>What to Carry</span>
                <p>--</p>
            </div>
        </div>
        <div class="smart-item" id="suggestion-mood">
            <i class="fa-solid fa-face-smile"></i>
            <div>
                <span>Weather Mood</span>
                <p>--</p>
            </div>
        </div>
    </div>

    <!-- Forecast Overlay -->
    <div id="forecast-overlay" class="forecast-overlay hidden">
        <div class="forecast-header">
            <h3>5-Day Forecast</h3>
            <div class="forecast-controls">
                <button id="filter-rainy">Rainy Only</button>
                <button id="sort-temp">Sort Temp</button>
                <span id="avg-temp">Avg: --°C</span>
            </div>
            <button class="close-forecast"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="forecast-cards" class="forecast-cards">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <div id="bg-overlay"></div>
    <div id="content" style="z-index: 2;"></div>

    <script src="config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
