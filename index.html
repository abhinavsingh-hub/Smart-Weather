<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Weather Dashboard | Interactive 3D Bot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading 3D Scene...</p>
    </div>

    <!-- 3D Canvas -->
    <canvas id="canvas3d"></canvas>

    <!-- Overlay UI -->
    <header>
        <div class="logo">WEADU</div>
        <nav>
            <ul>
                <li><a href="#" class="active">HOME</a></li>
                <li><a href="#">FORECAST</a></li>
                <li><a href="#">SETTINGS</a></li>
            </ul>
        </nav>
    </header>

    <div class="sidebar">
    <button class="glass-btn" data-action="search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Search</span>
    </button>

    <button class="glass-btn" data-action="style">
      <i class="fa-solid fa-shirt"></i>
      <span>Style</span>
    </button>

    <button class="glass-btn" data-action="forecast">
      <i class="fa-solid fa-calendar-days"></i>
      <span>Forecast</span>
    </button>
  </div>

<div class="weather-dashboard" id="weatherDashboard">
  
  <div class="wd-top">
    <h2 id="city">--</h2>
    <p id="date"></p>
  </div>

  <div class="wd-main">
    <i id="weatherIcon" class="fa-solid fa-cloud"></i>
    <h1 id="temp">--°C</h1>
    <p id="condition">--</p>
  </div>

  <div class="wd-extra">
    <div>
      <span>Feels</span>
      <p id="feels"></p>
    </div>
    <div>
      <span>Humidity</span>
      <p id="humidity"></p>
    </div>
    <div>
      <span>Wind</span>
      <p id="wind"></p>
    </div>
  </div>

</div>
<div id="bg-overlay"></div>
  <div id="content" style="z-index: 2;"></div>

    <script src="config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
